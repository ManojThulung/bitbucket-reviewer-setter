<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Reviewer</title>
    <script defer src="popup.js"></script>
    <style>
        body { 
            width: 250px; 
            padding: 10px; 
            font-family: sans-serif; 
        }
        input, button { 
            width: 100%; 
            margin-top: 10px; 
            padding: 8px; 
            box-sizing: border-box; 
        }
        button { 
            background: #0052CC; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 3px; 
        }
  </style>
</head>
<body>
    <h4>Set Custom Reviewer</h4>
    <input type="text" id="reviewerName" placeholder="Enter Reviewer Name">
    <button id="saveBtn">Save Name</button>
    <hr>
    <button id="applyBtn">Set Reviewer</button>
</body>
</html>
