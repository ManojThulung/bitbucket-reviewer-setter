<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set Reviewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 280px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #172b4d;
    }
    .header {
      padding: 12px 16px;
      background: #0052cc;
      color: white;
    }
    .header h3 {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 600;
    }
    .header p {
      margin: 0;
      font-size: 11px;
      opacity: 0.85;
    }
    #reviewer-list {
      max-height: 300px;
      overflow-y: auto;
      background: white;
    }
    .reviewer-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #ebecf0;
      gap: 10px;
    }
    .reviewer-item img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #dfe1e6;
      flex-shrink: 0;
    }
    .reviewer-item .name {
      flex: 1;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #97a0af;
      cursor: pointer;
      font-size: 18px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #de350b; }
    .empty {
      padding: 20px 16px;
      text-align: center;
      color: #97a0af;
      font-size: 12px;
      line-height: 1.6;
      background: white;
    }
    .footer {
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #dfe1e6;
    }
    .btn-apply {
      flex: 1;
      padding: 9px;
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-apply:hover { background: #0747a6; }
    .btn-apply:disabled { background: #b3bac5; cursor: default; }
    .btn-clear {
      padding: 9px 12px;
      background: #dfe1e6;
      color: #42526e;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-clear:hover { background: #c1c7d0; }
    #status {
      font-size: 12px;
      padding: 4px 12px;
      min-height: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Bitbucket Reviewer Setter</h3>
    <p>Open the reviewer dropdown on a PR page, then click "+ Add" next to a name.</p>
  </div>
  <div id="reviewer-list"></div>
  <div id="status"></div>
  <div class="footer">
    <button class="btn-clear" id="clearBtn">Clear All</button>
    <button class="btn-apply" id="applyBtn" disabled>Apply to PR</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
